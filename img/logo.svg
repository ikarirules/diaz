<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" width="260" height="80">
  <!-- Orbit-D symbol -->
  <!-- Planet (dark circle) -->
  <circle cx="35" cy="40" r="22" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Orbit ellipse (tilted) -->
  <ellipse cx="35" cy="40" rx="34" ry="12" fill="none" stroke="#f5c400" stroke-width="3.5"
           transform="rotate(-28 35 40)"/>
  <!-- Sphere on orbit -->
  <circle cx="60" cy="20" r="7.5" fill="#f5c400"/>
  <!-- Letter D (white) using path -->
  <path d="M22 24 L22 56 L36 56 C50 56 57 50 57 40 C57 30 50 24 36 24 Z" fill="white"/>
  <path d="M28 30 L28 50 L36 50 C46 50 51 46 51 40 C51 34 46 30 36 30 Z" fill="#1a1a1a"/>

  <!-- Separator -->
  <rect x="76" y="20" width="2" height="40" fill="#2a2a2a" rx="1"/>

  <!-- Text group -->
  <!-- DIAZ (white bold) -->
  <text x="88" y="47"
        font-family="'Montserrat', 'Arial Black', sans-serif"
        font-weight="900"
        font-size="26"
        letter-spacing="2"
        fill="#ffffff">DIAZ</text>
  <!-- studio (yellow) -->
  <text x="171" y="47"
        font-family="'Montserrat', 'Inter', sans-serif"
        font-weight="400"
        font-size="18"
        letter-spacing="1"
        fill="#f5c400">studio</text>

  <!-- Tagline -->
  <text x="88" y="63"
        font-family="'Inter', Arial, sans-serif"
        font-weight="400"
        font-size="9"
        letter-spacing="2.5"
        fill="#666666">DISEÑO · REDES · WEB</text>
</svg>
